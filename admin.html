<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | BROW BEAUTY</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Heebo', sans-serif; background: #faf9f6; color: #1a1c1a; min-height: 100vh; }

    .brand-name { font-family: 'Playfair Display', serif; font-weight: 900; letter-spacing: .08em; background: linear-gradient(135deg,#775a19,#e0b96f,#a0825a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .card { background:#fff; border:1px solid rgba(119,90,25,0.1); border-radius:1.25rem; box-shadow:0 2px 12px rgba(26,28,26,0.06); }

    /* Login screen */
    #loginScreen { position:fixed; inset:0; z-index:100; background:#faf9f6; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#fff; border:1px solid rgba(119,90,25,0.15); border-radius:1.5rem; padding:2.5rem; width:100%; max-width:360px; box-shadow:0 8px 32px rgba(119,90,25,0.1); }
    .pin-input { background:#faf9f6; border:1px solid rgba(119,90,25,0.2); border-radius:.75rem; color:#1a1c1a; font-size:1rem; text-align:right; outline:none; width:100%; padding:.75rem 1rem; transition:border-color .2s; }
    .pin-input:focus { border-color:#775a19; }
    .pin-input::placeholder { color:#9b9b8f; }
    #passwordInput { letter-spacing:.2rem; font-size:1.25rem; }
    .btn-gold { background:linear-gradient(135deg,#775a19,#e0b96f); color:white; font-weight:700; border:none; cursor:pointer; transition:all .3s; }
    .btn-gold:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(119,90,25,.35); }

    /* Nav */
    .admin-nav { background:rgba(250,249,246,0.95); border-bottom:1px solid rgba(119,90,25,0.12); backdrop-filter:blur(24px); }

    /* Stats */
    .stat-card { background:#fff; border:1px solid rgba(119,90,25,0.08); border-radius:1.25rem; box-shadow:0 1px 8px rgba(26,28,26,0.05); }

    /* Calendar */
    .cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:.5rem; font-size:13px; font-weight:500; cursor:pointer; transition:all .2s; position:relative; color:#1a1c1a; }
    .cal-day:hover:not(.empty) { background:rgba(119,90,25,0.07); }
    .cal-day.today { border:1.5px solid #775a19; color:#775a19; font-weight:700; }
    .cal-day.selected { background:#775a19; color:white; }
    .cal-day.empty { cursor:default; }
    .cal-day.has-appt::after { content:''; position:absolute; bottom:3px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:#775a19; }

    /* Appointment row */
    .appt-row { transition:all .2s; cursor:pointer; border-radius:.75rem; }
    .appt-row:hover { background:rgba(119,90,25,0.04); }

    /* Modal */
    .modal-bg { position:fixed; inset:0; background:rgba(26,28,26,0.5); z-index:50; display:flex; align-items:flex-end; justify-content:center; padding:0; overflow-y:auto; }
    @media (min-width:640px) { .modal-bg { align-items:center; padding:1rem; } }
    .modal-card { background:#fff; border:1px solid rgba(119,90,25,0.12); border-radius:1.5rem 1.5rem 0 0; width:100%; max-width:440px; overflow-y:auto; max-height:92vh; box-shadow:0 -8px 40px rgba(26,28,26,0.15); }
    @media (min-width:640px) { .modal-card { border-radius:1.5rem; max-height:88vh; } }

    /* Info cells */
    .info-cell { background:#faf9f6; border:1px solid rgba(119,90,25,0.08); border-radius:.875rem; padding:.875rem; }
    .info-cell .label { font-size:.7rem; color:#9b9b8f; font-weight:600; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.25rem; }
    .info-cell .value { font-weight:600; color:#1a1c1a; font-size:.95rem; }

    /* Badge */
    .badge-active { background:rgba(21,128,61,.1); color:#15803d; border:1px solid rgba(21,128,61,.2); }
    .badge-cancelled { background:rgba(185,28,28,.1); color:#b91c1c; border:1px solid rgba(185,28,28,.2); }
    .badge-pending { background:rgba(161,98,7,.1); color:#a16207; border:1px solid rgba(161,98,7,.2); }

    /* Dividers in list */
    .list-divider { border-color:rgba(119,90,25,0.08); }

    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .filled { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation:fadeIn .25s ease; }

    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(119,90,25,0.2);border-radius:2px}
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="text-center mb-8">
      <span class="brand-name text-2xl tracking-widest block mb-2">BROW BEAUTY</span>
      <p class="text-outline/50 text-sm">כניסת מנהל</p>
    </div>
    <div class="mb-4">
      <label class="block text-xs font-bold text-outline/50 tracking-wider uppercase mb-2">שם משתמש</label>
      <input type="text" id="usernameInput" class="pin-input" placeholder="admin" autocomplete="username" />
    </div>
    <div class="mb-6">
      <label class="block text-xs font-bold text-outline/50 tracking-wider uppercase mb-2">סיסמה</label>
      <input type="password" id="passwordInput" class="pin-input" placeholder="••••••" autocomplete="current-password" />
      <p id="pinError" class="text-red-500 text-xs text-center mt-2 hidden">שם משתמש או סיסמה שגויים. נסי שוב.</p>
    </div>
    <button onclick="doLogin()" class="btn-gold w-full py-3 rounded-xl text-base">כניסה</button>
    <div class="text-center mt-5">
      <a href="index.html" class="text-outline/40 hover:text-primary transition-colors text-sm tracking-wide">← חזרה לדף הבית</a>
    </div>
  </div>
</div>

<!-- ══ ADMIN DASHBOARD ══ -->
<div id="adminApp" class="hidden min-h-screen">

  <!-- NAV -->
  <header class="admin-nav sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-6 py-4 flex flex-row-reverse justify-between items-center">
      <span class="brand-name text-xl tracking-widest">BROW BEAUTY</span>
      <div class="flex items-center gap-3">
        <span class="text-xs text-outline/60 font-medium">ממשק ניהול</span>
        <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
      </div>
      <button onclick="logout()" class="text-outline/50 hover:text-primary transition-colors text-sm flex items-center gap-1">
        <span class="material-symbols-outlined text-base">logout</span> יציאה
      </button>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- STATS ROW -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="stat-card p-5 text-center">
        <p class="text-3xl font-bold text-primary mb-1" id="statTotal">0</p>
        <p class="text-xs text-outline/60 font-medium">סה״כ תורים</p>
      </div>
      <div class="stat-card p-5 text-center">
        <p class="text-3xl font-bold text-green-600 mb-1" id="statToday">0</p>
        <p class="text-xs text-outline/60 font-medium">היום</p>
      </div>
      <div class="stat-card p-5 text-center">
        <p class="text-3xl font-bold text-blue-600 mb-1" id="statWeek">0</p>
        <p class="text-xs text-outline/60 font-medium">השבוע</p>
      </div>
      <div class="stat-card p-5 text-center">
        <p class="text-3xl font-bold text-red-500 mb-1" id="statCancelled">0</p>
        <p class="text-xs text-outline/60 font-medium">בוטלו</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- CALENDAR -->
      <div class="lg:col-span-1">
        <div class="card p-5">
          <div class="flex items-center justify-between mb-5">
            <button id="calPrev" class="w-8 h-8 rounded-full hover:bg-primary/08 flex items-center justify-center transition-colors">
              <span class="material-symbols-outlined text-outline/60 text-lg">chevron_right</span>
            </button>
            <span id="calTitle" class="font-bold text-on-surface text-sm"></span>
            <button id="calNext" class="w-8 h-8 rounded-full flex items-center justify-center transition-colors">
              <span class="material-symbols-outlined text-outline/60 text-lg">chevron_left</span>
            </button>
          </div>
          <!-- Day headers -->
          <div class="grid grid-cols-7 mb-2">
            <div class="text-[10px] text-outline/40 text-center py-1 font-bold">א</div>
            <div class="text-[10px] text-outline/40 text-center py-1 font-bold">ב</div>
            <div class="text-[10px] text-outline/40 text-center py-1 font-bold">ג</div>
            <div class="text-[10px] text-outline/40 text-center py-1 font-bold">ד</div>
            <div class="text-[10px] text-outline/40 text-center py-1 font-bold">ה</div>
            <div class="text-[10px] text-outline/40 text-center py-1 font-bold">ו</div>
            <div class="text-[10px] text-outline/40 text-center py-1 font-bold">ש</div>
          </div>
          <div class="grid grid-cols-7 gap-1" id="adminCalGrid"></div>
        </div>

        <!-- Jump to date -->
        <div class="card p-4 mt-4">
          <p class="text-xs text-outline/50 uppercase tracking-wider mb-3 font-bold">קפיצה לתאריך</p>
          <input type="date" id="jumpDate" class="w-full bg-surface rounded-lg border border-primary/15 px-3 py-2 text-on-surface text-sm outline-none focus:border-primary/50" style="background:#faf9f6" />
          <button onclick="jumpToDate()" class="btn-gold w-full py-2 rounded-lg text-sm mt-2">עבור</button>
        </div>
      </div>

      <!-- APPOINTMENTS LIST -->
      <div class="lg:col-span-2">
        <div class="card overflow-hidden">
          <!-- Header -->
          <div class="px-5 py-4 border-b border-primary/08 flex flex-row-reverse justify-between items-center" style="border-color:rgba(119,90,25,0.08)">
            <h2 class="font-bold text-on-surface text-sm" id="listTitle">כל התורים</h2>
            <div class="flex gap-2">
              <select id="filterStatus" onchange="renderList()" class="text-xs bg-surface border border-primary/15 rounded-lg px-2 py-1.5 text-on-surface/70 outline-none" style="background:#faf9f6">
                <option value="all">הכל</option>
                <option value="active">פעיל</option>
                <option value="cancelled">בוטל</option>
              </select>
              <button onclick="selectedDate=null;renderList();renderCalendar()" class="text-xs text-outline/50 hover:text-primary transition-colors px-2">הצג הכל</button>
            </div>
          </div>

          <!-- List -->
          <div class="divide-y overflow-y-auto max-h-[520px]" style="border-color:rgba(119,90,25,0.08)" id="apptList">
            <!-- Populated by JS -->
          </div>

          <!-- Empty state -->
          <div id="emptyState" class="hidden py-16 text-center">
            <span class="material-symbols-outlined text-outline/20 text-5xl block mb-3">calendar_month</span>
            <p class="text-outline/40 text-sm">אין תורים לתאריך זה</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ APPOINTMENT MODAL ══ -->
<div id="apptModal" class="modal-bg hidden" onclick="closeModal(event)">
  <div class="modal-card fade-in" onclick="event.stopPropagation()">
    <!-- Modal header -->
    <div class="px-6 py-5 border-b flex flex-row-reverse justify-between items-center sticky top-0 bg-white z-10" style="border-color:rgba(119,90,25,0.1)">
      <h3 class="font-bold text-on-surface">פרטי תור</h3>
      <button onclick="closeModal()" class="flex items-center gap-1.5 text-outline/50 hover:text-primary transition-colors text-sm font-medium">
        <span class="material-symbols-outlined text-base">arrow_forward</span>
        חזור
      </button>
    </div>

    <!-- Client info -->
    <div class="px-6 py-5 space-y-4">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#775a19] to-[#e0b96f] flex items-center justify-center text-white text-xl font-bold flex-shrink-0" id="mClientInitial">א</div>
        <div>
          <p class="text-on-surface font-bold text-xl" id="mClientName">—</p>
          <span class="text-xs px-2 py-0.5 rounded-full inline-block mt-1" id="mStatusBadge">—</span>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="info-cell">
          <p class="label">שירות</p>
          <p class="value" id="mService">—</p>
        </div>
        <div class="info-cell">
          <p class="label">מחיר</p>
          <p class="value text-primary font-bold" id="mPrice">—</p>
        </div>
        <div class="info-cell">
          <p class="label">תאריך</p>
          <p class="value" id="mDate">—</p>
        </div>
        <div class="info-cell">
          <p class="label">שעה</p>
          <p class="value" id="mTime">—</p>
        </div>

      <div class="info-cell">

      <div class="info-cell" id="mNotesBox">
        <p class="label">הערות</p>

    <!-- Actions -->
    <div class="px-6 pb-8 space-y-3" id="mActions">
      <!-- Phone call -->
      <button id="mCallBtn" onclick="callClient()" class="w-full flex items-center justify-center gap-3 py-3.5 rounded-xl border font-bold transition-colors hover:bg-green-50" style="border-color:rgba(21,128,61,0.25); color:#15803d">
        <span class="material-symbols-outlined">phone</span>
        <span id="mCallLabel">התקשרי ללקוחה</span>
      </button>

      <!-- WhatsApp — reschedule -->
      <button onclick="whatsappReschedule()" class="w-full flex items-center justify-center gap-3 py-3.5 rounded-xl border font-bold transition-colors hover:bg-green-50" style="border-color:rgba(37,211,102,0.3); color:#128c7e">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        הזיזי תור — שלחי WhatsApp
      </button>

      <!-- Cancel -->
      <button id="mCancelBtn" onclick="cancelAppointment()" class="w-full flex items-center justify-center gap-3 py-3.5 rounded-xl font-bold transition-colors hover:bg-red-50" style="background:rgba(185,28,28,0.06); color:#b91c1c; border:1px solid rgba(185,28,28,0.15)">
        <span class="material-symbols-outlined">cancel</span>
        ביטול תור
      </button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
//  CONFIG — שני פרמטרים לשינוי
// ═══════════════════════════════════
const ADMIN_USERNAME = 'admin';      // ← שני כאן את שם המשתמש
const ADMIN_PASSWORD = '1234';       // ← שני כאן את הסיסמה
const STUDIO_PHONE = '0501234567';   // ← מספר הטלפון של הסטודיו

// ═══════════════════════════════════
//  LOGIN
// ═══════════════════════════════════
function doLogin() {
  const username = document.getElementById('usernameInput').value.trim();
  const password = document.getElementById('passwordInput').value.trim();
  if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').classList.remove('hidden');
    init();
  } else {
    document.getElementById('pinError').classList.remove('hidden');
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}
document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('usernameInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('passwordInput').focus(); });

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminApp').classList.add('hidden');
  document.getElementById('usernameInput').value = '';
  document.getElementById('passwordInput').value = '';
  document.getElementById('pinError').classList.add('hidden');
}

// ═══════════════════════════════════
//  DATA — localStorage
// ═══════════════════════════════════
function getAppointments() {
  try { return JSON.parse(localStorage.getItem('bb_appointments') || '[]'); }
  catch { return []; }
}
function saveAppointments(arr) {
  localStorage.setItem('bb_appointments', JSON.stringify(arr));
}

// ─── Seed demo data if empty ───
function seedDemoData() {
  const existing = getAppointments();
  if (existing.length > 0) return;

  const today = new Date();
  const fmt = (d) => {
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    return `${d.getFullYear()}-${mm}-${dd}`;
  };
  const addDays = (n) => { const d = new Date(today); d.setDate(d.getDate()+n); return d; };

  const demos = [
    { id: genId(), name: 'שירה כהן', phone: '0541234567', email: '', service: 'עיצוב גבות', price: 120, date: fmt(today), time: '10:30', notes: '', status: 'active', createdAt: new Date().toISOString() },
    { id: genId(), name: 'מיכל לוי', phone: '0521234567', email: 'michal@gmail.com', service: 'מיקרובליידינג', price: 1200, date: fmt(today), time: '14:00', notes: 'רגישות לניקל', status: 'active', createdAt: new Date().toISOString() },
    { id: genId(), name: 'דנה ישראלי', phone: '0531234567', email: '', service: 'גבות + שפם', price: 180, date: fmt(addDays(1)), time: '09:00', notes: '', status: 'active', createdAt: new Date().toISOString() },
    { id: genId(), name: 'נועה גולן', phone: '0501234567', email: '', service: 'החבילה המשתלמת', price: 320, date: fmt(addDays(2)), time: '11:15', notes: 'לקוחה חוזרת', status: 'active', createdAt: new Date().toISOString() },
    { id: genId(), name: 'תמר אביב', phone: '0521112233', email: '', service: 'שעווה בפנים', price: 250, date: fmt(addDays(3)), time: '16:30', notes: '', status: 'active', createdAt: new Date().toISOString() },
    { id: genId(), name: 'ליאת רוזן', phone: '0541112233', email: '', service: 'צביעת גבות', price: 80, date: fmt(addDays(-1)), time: '13:00', notes: '', status: 'cancelled', createdAt: new Date().toISOString() },
  ];
  saveAppointments(demos);
}
function genId() { return Math.random().toString(36).substr(2,9); }

// ═══════════════════════════════════
//  CALENDAR
// ═══════════════════════════════════
const hebrewMonths = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDate = null;

function renderCalendar() {
  document.getElementById('calTitle').textContent = `${hebrewMonths[calMonth]} ${calYear}`;
  const grid = document.getElementById('adminCalGrid');
  grid.innerHTML = '';
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const appts = getAppointments();
  const apptDates = new Set(appts.filter(a => a.status !== 'cancelled').map(a => a.date));

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
  }
  for (let day = 1; day <= daysInMonth; day++) {
    const d = document.createElement('div');
    const date = new Date(calYear, calMonth, day); date.setHours(0,0,0,0);
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    d.className = 'cal-day';
    d.textContent = day;
    if (date.getTime() === today.getTime()) d.classList.add('today');
    if (selectedDate === dateStr) d.classList.add('selected');
    if (apptDates.has(dateStr)) d.classList.add('has-appt');
    d.addEventListener('click', () => { selectedDate = dateStr; renderCalendar(); renderList(); });
    grid.appendChild(d);
  }
}

document.getElementById('calPrev').addEventListener('click', () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); });
document.getElementById('calNext').addEventListener('click', () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); });

function jumpToDate() {
  const val = document.getElementById('jumpDate').value;
  if (!val) return;
  const d = new Date(val);
  calYear = d.getFullYear(); calMonth = d.getMonth();
  selectedDate = val;
  renderCalendar(); renderList();
}

// ═══════════════════════════════════
//  APPOINTMENTS LIST
// ═══════════════════════════════════
const serviceColors = {
  'עיצוב גבות': '#e0b96f', 'מיקרובליידינג': '#b8a0d8', 'גבות + שפם': '#80b8a0',
  'שעווה בפנים': '#d8a0a0', 'צביעת גבות': '#a0b8d8', 'החבילה המשתלמת': '#d8c8a0',
};

function renderList() {
  const list = document.getElementById('apptList');
  const empty = document.getElementById('emptyState');
  const filterVal = document.getElementById('filterStatus').value;
  let appts = getAppointments();

  if (selectedDate) {
    appts = appts.filter(a => a.date === selectedDate);
    const [y,m,d] = selectedDate.split('-');
    document.getElementById('listTitle').textContent = `${parseInt(d)} ${hebrewMonths[parseInt(m)-1]} ${y}`;
  } else {
    document.getElementById('listTitle').textContent = 'כל התורים';
  }
  if (filterVal !== 'all') appts = appts.filter(a => a.status === filterVal);
  appts.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));

  list.innerHTML = '';
  if (appts.length === 0) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  appts.forEach(appt => {
    const [y,m,d] = appt.date.split('-');
    const dateLabel = `${parseInt(d)} ${hebrewMonths[parseInt(m)-1]} ${y}`;
    const color = serviceColors[appt.service] || '#e0b96f';
    const isCancelled = appt.status === 'cancelled';

    const row = document.createElement('div');
    row.className = 'appt-row px-5 py-4';
    row.style.opacity = isCancelled ? '0.5' : '1';
    row.innerHTML = `
      <div class="flex flex-row-reverse items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-base flex-shrink-0" style="background:${color}22;border:1px solid ${color}44;color:${color}">
            ${appt.name.charAt(0)}
          </div>
          <div>
            <p class="text-white font-bold text-sm ${isCancelled ? 'line-through' : ''}">${appt.name}</p>
            <p class="text-white/40 text-xs">${appt.phone}</p>
          </div>
        </div>
        <div class="text-left flex items-center gap-3">
          <div>
            <p class="text-xs text-white/40">${dateLabel}</p>
            <p class="text-white/70 font-medium text-sm">${appt.time} | ${appt.service}</p>
          </div>
          <div class="flex flex-col items-center gap-1">
            <span class="text-xs px-2 py-0.5 rounded-full font-bold ${isCancelled ? 'badge-cancelled' : 'badge-active'}">${isCancelled ? 'בוטל' : 'פעיל'}</span>
            <span class="text-xs font-bold" style="color:${color}">₪${appt.price.toLocaleString()}</span>
          </div>
        </div>
      </div>
    `;
    row.addEventListener('click', () => openModal(appt));
    list.appendChild(row);
  });
}

// ═══════════════════════════════════
//  STATS
// ═══════════════════════════════════
function updateStats() {
  const appts = getAppointments();
  const today = new Date().toISOString().slice(0,10);
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekStr = weekStart.toISOString().slice(0,10);

  document.getElementById('statTotal').textContent = appts.filter(a => a.status !== 'cancelled').length;
  document.getElementById('statToday').textContent = appts.filter(a => a.date === today && a.status !== 'cancelled').length;
  document.getElementById('statWeek').textContent = appts.filter(a => a.date >= weekStr && a.status !== 'cancelled').length;
  document.getElementById('statCancelled').textContent = appts.filter(a => a.status === 'cancelled').length;
}

// ═══════════════════════════════════
//  MODAL
// ═══════════════════════════════════
let currentAppt = null;

function openModal(appt) {
  currentAppt = appt;
  const isCancelled = appt.status === 'cancelled';
  const [y,m,d] = appt.date.split('-');
  const dateLabel = `${parseInt(d)} ${hebrewMonths[parseInt(m)-1]} ${y}`;

  document.getElementById('mClientInitial').textContent = appt.name.charAt(0);
  document.getElementById('mClientName').textContent = appt.name;
  document.getElementById('mService').textContent = appt.service;
  document.getElementById('mPrice').textContent = `₪${appt.price.toLocaleString()}`;
  document.getElementById('mDate').textContent = dateLabel;
  document.getElementById('mTime').textContent = appt.time;
  document.getElementById('mPhone').textContent = appt.phone;
  document.getElementById('mNotes').textContent = appt.notes || 'אין הערות';

  const badge = document.getElementById('mStatusBadge');
  badge.textContent = isCancelled ? 'בוטל' : 'פעיל';
  badge.className = `text-xs px-2 py-0.5 rounded-full inline-block mt-1 ${isCancelled ? 'badge-cancelled' : 'badge-active'}`;

  document.getElementById('mCallLabel').textContent = `התקשרי — ${appt.phone}`;
  document.getElementById('mCallBtn').onclick = () => callClient();

  // Hide cancel button if already cancelled
  const cancelBtn = document.getElementById('mCancelBtn');
  cancelBtn.style.display = isCancelled ? 'none' : 'flex';

  document.getElementById('apptModal').classList.remove('hidden');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('apptModal')) {
    document.getElementById('apptModal').classList.add('hidden');
    currentAppt = null;
  }
}

// ═══════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════
function callClient() {
  if (!currentAppt) return;
  window.open(`tel:${currentAppt.phone}`);
}

function whatsappReschedule() {
  if (!currentAppt) return;
  const [y,m,d] = currentAppt.date.split('-');
  const dateLabel = `${parseInt(d)} ${hebrewMonths[parseInt(m)-1]} ${y}`;
  const msg = `שלום ${currentAppt.name} 😊\nכאן BROW BEAUTY.\nרצינו לתאם איתך הזזת התור שנקבע ל-${dateLabel} בשעה ${currentAppt.time}.\nאנא חזרי אלינו כדי לקבוע תאריך חדש 🙏`;
  const phone = currentAppt.phone.replace(/[^0-9]/g, '').replace(/^0/, '972');
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function cancelAppointment() {
  if (!currentAppt) return;
  if (!confirm(`לבטל את התור של ${currentAppt.name}?`)) return;
  const appts = getAppointments();
  const idx = appts.findIndex(a => a.id === currentAppt.id);
  if (idx !== -1) {
    appts[idx].status = 'cancelled';
    saveAppointments(appts);

    // Send WhatsApp cancellation
    const [y,m,d] = currentAppt.date.split('-');
    const dateLabel = `${parseInt(d)} ${hebrewMonths[parseInt(m)-1]} ${y}`;
    const msg = `שלום ${currentAppt.name},\nכאן BROW BEAUTY.\nלצערנו, נאלצנו לבטל את התור שנקבע ל-${dateLabel} בשעה ${currentAppt.time}.\nנשמח לקבוע תור חדש בהקדם 🙏`;
    const phone = currentAppt.phone.replace(/[^0-9]/g, '').replace(/^0/, '972');
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');

    closeModal();
    updateStats();
    renderCalendar();
    renderList();
  }
}

// ═══════════════════════════════════
//  INIT
// ═══════════════════════════════════
function init() {
  seedDemoData();
  renderCalendar();
  renderList();
  updateStats();
}
</script>
